<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dziennik Podróży</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:     #2c2416;
    --paper:   #f5efe2;
    --paper2:  #ede4d0;
    --rule:    #d6c9a8;
    --stork:   #4a7c8e;
    --tractor: #c0622b;
    --combine: #7a9e3f;
    --accent:  #8b6914;
    --shadow:  rgba(44,36,22,.14);
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image: repeating-linear-gradient(transparent, transparent 27px, var(--rule) 27px, var(--rule) 28px);
    background-position: 0 64px;
  }
  header {
    background: var(--paper2);
    border-bottom: 2px solid var(--rule);
    padding: 28px 36px 22px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }
  .logo { font-size: 2.6rem; line-height: 1; }
  .header-text h1 { font-family: 'Playfair Display', serif; font-size: 1.65rem; font-weight: 700; }
  .header-text p { font-size: .82rem; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; margin-top: 3px; }
  main { max-width: 1200px; margin: 0 auto; padding: 36px 24px 60px; }
  .card {
    background: var(--paper2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 24px;
    box-shadow: 0 2px 12px var(--shadow);
    margin-bottom: 24px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  /* Totals row */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .stat-box { background: var(--paper); border: 1px solid var(--rule); border-radius: 3px; padding: 14px 10px; text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; margin-top: 5px; color: var(--accent); }

  /* Chart legend */
  .legend { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
  .pill { display: flex; align-items: center; gap: 7px; font-size: .84rem; }
  .pill-dot { width: 11px; height: 11px; border-radius: 50%; }

  /* Charts layout: main left, two small right */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 18px;
    align-items: start;
  }
  .chart-main-wrap {
    position: relative;
    width: 100%;
    height: 360px;
  }
  .charts-side {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .side-chart-block {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 14px 16px;
  }
  .side-chart-title {
    font-family: 'Playfair Display', serif;
    font-size: .88rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--rule);
  }
  .chart-side-wrap {
    position: relative;
    width: 100%;
    height: 156px;
  }

  /* Monthly grid */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .month-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 14px 16px;
  }
  .month-name {
    font-family: 'Playfair Display', serif;
    font-size: .95rem;
    font-weight: 700;
    margin-bottom: 10px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--rule);
    color: var(--accent);
  }
  .month-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: .85rem;
  }
  .month-row-label { display: flex; align-items: center; gap: 6px; }
  .month-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .month-val { font-weight: 700; font-family: 'Playfair Display', serif; font-size: .95rem; }
  .month-days { font-size: .7rem; color: var(--accent); margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--rule); }

  @media (max-width: 820px) {
    .charts-row { grid-template-columns: 1fr; }
    .chart-main-wrap { height: 280px; }
    .charts-side { flex-direction: row; }
    .side-chart-block { flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🚗</div>
  <div class="header-text">
    <h1>Dziennik Podróży</h1>
    <p>Bociany · Traktory · Kombajny</p>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="totalStorks" style="color:var(--stork)">—</div>
      <div class="stat-label">🐦 Bociany łącznie</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="totalTractors" style="color:var(--tractor)">—</div>
      <div class="stat-label">🚜 Traktory łącznie</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="totalCombines" style="color:var(--combine)">—</div>
      <div class="stat-label">🌾 Kombajny łącznie</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📈 Obserwacje w czasie</div>
    <div class="legend">
      <span class="pill"><span class="pill-dot" style="background:var(--stork)"></span>Bociany</span>
      <span class="pill"><span class="pill-dot" style="background:var(--tractor)"></span>Traktory</span>
      <span class="pill"><span class="pill-dot" style="background:var(--combine)"></span>Kombajny</span>
    </div>
    <div class="charts-row">
      <!-- Main line chart -->
      <div class="chart-main-wrap">
        <canvas id="myChart"></canvas>
      </div>

      <!-- Two side charts stacked -->
      <div class="charts-side">
        <div class="side-chart-block">
          <div class="side-chart-title">📅 Według miesiąca</div>
          <div class="chart-side-wrap">
            <canvas id="monthChart"></canvas>
          </div>
        </div>
        <div class="side-chart-block">
          <div class="side-chart-title">📆 Według dnia tygodnia</div>
          <div class="chart-side-wrap">
            <canvas id="dowChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Podsumowanie miesięczne</div>
    <div class="month-grid" id="monthlyGrid"></div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════
//  DANE  —  dodawaj kolejne linijki poniżej
//  Format: { date: "DD.MM.RRRR", storks: 0, tractors: 0, combines: 0 },
// ═══════════════════════════════════════════════════════════
const DATA = [
  { date: "05.04.2026", storks: 2, tractors: 24, combines: 0 },
  { date: "11.04.2026", storks: 0, tractors: 20, combines: 0 },
  { date: "12.04.2026", storks: 4, tractors: 13, combines: 0 },
  { date: "15.04.2026", storks: 6, tractors: 8, combines: 0 },
  { date: "18.04.2026", storks: 0, tractors: 10, combines: 0 },
  { date: "19.04.2026", storks: 4, tractors: 8, combines: 0 },
  { date: "22.04.2026", storks: 4, tractors: 5, combines: 0 },
  { date: "23.04.2026", storks: 0, tractors: 5, combines: 0 },
  { date: "25.04.2026", storks: 66, tractors: 73, combines: 1 },
  { date: "26.04.2026", storks: 0, tractors: 4, combines: 0 },
];
// ═══════════════════════════════════════════════════════════

const MONTHS_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec",
                   "Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
const MONTHS_SHORT = ["Sty","Lut","Mar","Kwi","Maj","Cze",
                      "Lip","Sie","Wrz","Paź","Lis","Gru"];

// getDay(): 0=Sun, 1=Mon, ..., 6=Sat
const DOW_LABELS = ["Pon","Wto","Śro","Czw","Pią","Sob","Nie"];
const DOW_MAP    = [6, 0, 1, 2, 3, 4, 5]; // maps getDay() → DOW index (Mon=0)

// ─── Totals ───
let ts = 0, tt = 0, tc = 0;
DATA.forEach(e => { ts += e.storks; tt += e.tractors; tc += e.combines; });
document.getElementById('totalStorks').textContent   = ts;
document.getElementById('totalTractors').textContent = tt;
document.getElementById('totalCombines').textContent = tc;

// Helper: parse DD.MM.YYYY → Date
function parseDate(str) {
  const [d, m, y] = str.split('.').map(Number);
  return new Date(y, m - 1, d);
}

// ─── Group by month (key: "MM.YYYY") ───
const byMonth = {};
DATA.forEach(e => {
  const key = e.date.slice(3); // "MM.YYYY"
  if (!byMonth[key]) byMonth[key] = { storks: 0, tractors: 0, combines: 0, days: 0 };
  byMonth[key].storks   += e.storks;
  byMonth[key].tractors += e.tractors;
  byMonth[key].combines += e.combines;
  byMonth[key].days++;
});

const sortedMonths = Object.entries(byMonth).sort(([a], [b]) => {
  const [am, ay] = a.split('.').map(Number);
  const [bm, by] = b.split('.').map(Number);
  return ay !== by ? ay - by : am - bm;
});

// ─── Group by day of week ───
const byDow = Array.from({ length: 7 }, () => ({ storks: 0, tractors: 0, combines: 0 }));
DATA.forEach(e => {
  const dow = DOW_MAP[parseDate(e.date).getDay()];
  byDow[dow].storks   += e.storks;
  byDow[dow].tractors += e.tractors;
  byDow[dow].combines += e.combines;
});

// ─── Shared chart options helpers ───
const sideScaleOpts = {
  x: {
    grid: { color: 'rgba(214,201,168,.35)' },
    ticks: { color: '#7a6a4a', font: { family: 'Lato', size: 10 }, maxRotation: 0 }
  },
  y: {
    beginAtZero: true,
    grid: { color: 'rgba(214,201,168,.5)' },
    ticks: { color: '#7a6a4a', font: { family: 'Lato', size: 10 }, precision: 0, maxTicksLimit: 5 }
  }
};
const tooltipOpts = {
  backgroundColor: '#2c2416',
  titleColor: '#f5efe2',
  bodyColor: '#ddd0b0',
  padding: 10,
  cornerRadius: 3,
  callbacks: { label: ctx => `  ${ctx.dataset.label}: ${ctx.parsed.y}` }
};

// ─── 1. Main line chart ───
new Chart(document.getElementById('myChart'), {
  type: 'line',
  data: {
    labels: DATA.map(e => e.date),
    datasets: [
      {
        label: 'Bociany',
        data: DATA.map(e => e.storks),
        borderColor: '#4a7c8e', backgroundColor: 'rgba(74,124,142,.12)',
        tension: .35, fill: true,
        pointRadius: DATA.length > 90 ? 2 : 5, pointHoverRadius: 7, borderWidth: 2,
      },
      {
        label: 'Traktory',
        data: DATA.map(e => e.tractors),
        borderColor: '#c0622b', backgroundColor: 'rgba(192,98,43,.10)',
        tension: .35, fill: true,
        pointRadius: DATA.length > 90 ? 2 : 5, pointHoverRadius: 7, borderWidth: 2,
      },
      {
        label: 'Kombajny',
        data: DATA.map(e => e.combines),
        borderColor: '#7a9e3f', backgroundColor: 'rgba(122,158,63,.10)',
        tension: .35, fill: true,
        pointRadius: DATA.length > 90 ? 2 : 5, pointHoverRadius: 7, borderWidth: 2,
      },
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: { ...tooltipOpts, padding: 12 }
    },
    scales: {
      x: {
        grid: { color: 'rgba(214,201,168,.4)' },
        ticks: { color: '#7a6a4a', font: { family: 'Lato', size: 11 }, maxRotation: 45, maxTicksLimit: 24 }
      },
      y: {
        beginAtZero: true,
        grid: { color: 'rgba(214,201,168,.5)' },
        ticks: { color: '#7a6a4a', font: { family: 'Lato', size: 11 }, precision: 0 }
      }
    }
  }
});

// ─── 2. Monthly bar chart ───
new Chart(document.getElementById('monthChart'), {
  type: 'bar',
  data: {
    labels: sortedMonths.map(([key]) => {
      const [mm, yyyy] = key.split('.');
      return MONTHS_SHORT[parseInt(mm, 10) - 1] + ' ' + yyyy;
    }),
    datasets: [
      {
        label: 'Bociany',
        data: sortedMonths.map(([, v]) => v.storks),
        backgroundColor: 'rgba(74,124,142,.75)',
        borderColor: '#4a7c8e',
        borderWidth: 1,
        borderRadius: 2,
      },
      {
        label: 'Traktory',
        data: sortedMonths.map(([, v]) => v.tractors),
        backgroundColor: 'rgba(192,98,43,.75)',
        borderColor: '#c0622b',
        borderWidth: 1,
        borderRadius: 2,
      },
      {
        label: 'Kombajny',
        data: sortedMonths.map(([, v]) => v.combines),
        backgroundColor: 'rgba(122,158,63,.75)',
        borderColor: '#7a9e3f',
        borderWidth: 1,
        borderRadius: 2,
      },
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: tooltipOpts,
    },
    scales: sideScaleOpts,
  }
});

// ─── 3. Day-of-week bar chart ───
new Chart(document.getElementById('dowChart'), {
  type: 'bar',
  data: {
    labels: DOW_LABELS,
    datasets: [
      {
        label: 'Bociany',
        data: byDow.map(d => d.storks),
        backgroundColor: 'rgba(74,124,142,.75)',
        borderColor: '#4a7c8e',
        borderWidth: 1,
        borderRadius: 2,
      },
      {
        label: 'Traktory',
        data: byDow.map(d => d.tractors),
        backgroundColor: 'rgba(192,98,43,.75)',
        borderColor: '#c0622b',
        borderWidth: 1,
        borderRadius: 2,
      },
      {
        label: 'Kombajny',
        data: byDow.map(d => d.combines),
        backgroundColor: 'rgba(122,158,63,.75)',
        borderColor: '#7a9e3f',
        borderWidth: 1,
        borderRadius: 2,
      },
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: tooltipOpts,
    },
    scales: sideScaleOpts,
  }
});

// ─── Monthly summary cards ───
const grid = document.getElementById('monthlyGrid');
sortedMonths.forEach(([key, v]) => {
  const [mm, yyyy] = key.split('.');
  const monthName = MONTHS_PL[parseInt(mm, 10) - 1];
  grid.innerHTML += `
    <div class="month-card">
      <div class="month-name">${monthName} ${yyyy}</div>
      <div class="month-row">
        <span class="month-row-label"><span class="month-dot" style="background:var(--stork)"></span>Bociany</span>
        <span class="month-val" style="color:var(--stork)">${v.storks}</span>
      </div>
      <div class="month-row">
        <span class="month-row-label"><span class="month-dot" style="background:var(--tractor)"></span>Traktory</span>
        <span class="month-val" style="color:var(--tractor)">${v.tractors}</span>
      </div>
      <div class="month-row">
        <span class="month-row-label"><span class="month-dot" style="background:var(--combine)"></span>Kombajny</span>
        <span class="month-val" style="color:var(--combine)">${v.combines}</span>
      </div>
      <div class="month-days">${v.days} ${v.days === 1 ? 'dzień z danymi' : 'dni z danymi'}</div>
    </div>`;
});
</script>
</body>
</html>
